<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ejercicio9.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
    <title>Contacto | DevSolutions</title>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Contactanos</h1>
        <p class="subtitulo">¿Tienes dudas? Escribenos y te responderemos en 24h.</p>

        <form class="formulario">
            <div class="grupo-formulario">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Angel de Jesus" required>
            </div>

            <div class="grupo-doble">
                <div class="grupo-formulario">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="angel@example.com" required>
                </div>
                <div class="grupo-formulario">
                    <label for="telefono">Teléfono <span>(opcional)</span></label>
                    <input type="tel" id="telefono" placeholder="+52 123 456 7890">
                </div>
            </div>

            <div class="grupo-formulario">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" rows="5" placeholder="Describe tu consulta...." required></textarea>
            </div>

            <button type="submit" class="boton-enviar">Enviar Mensaje <span>-></span></button>
        </form>
    </div>
</body>
</html>
