<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio10.js"></script>
    <title>Calculadora de temperaturas</title>
</head>
<body>
    <div class="contenedor">
        <h1 class="titulo">Calculadora de Grados Celsius a Fahrenheit</h1>

        <form>
            <div class="contenedor-calculadora">
                <div class="datos">
                    <label for="celsius">Grados Celsius</label>
                    <input type="number" id="celsius" placeholder="Ingresa la temperatura en Celsius" required>
                </div>

                <button type="button" onclick="convertirTemperatura()">Convertir Grados</button>

                <div class="salida">
                    <label for="resultado">Grados Fahrenheit</label>
                    <input type="number" id="resultado" placeholder="Resultado en Fahrenheit" readonly>
                </div>
            </div>

        </form>
    </div>
</body>
</html>
