<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM - Ejercicio 18</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/ejercicio18.css">
</head>
<body class="bg-light custom-bg">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card custom-card">
                    <div class="card-body p-4">
                        <h1 class="text-center mb-4 custom-title">Agregar y Eliminar Elementos</h1>
                        
                        <div id="alertPlaceholder"></div>

                        <div class="input-group mb-4 shadow-sm">
                            <input type="text" id="nuevoElemento" class="form-control form-control-lg" placeholder="Escribe algo aquí...">
                            <button id="agregarBtn" class="btn btn-primary custom-btn">Agregar</button>
                        </div>
                        
                        <ul id="lista" class="list-group"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ejercicio18.js"></script>
</body>
</html>
